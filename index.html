<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>OpenLayers Image Viewer (EPSG:31984)</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- OpenLayers CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v9.2.4/ol.css">

    <link rel="stylesheet" href="app.css">
</head>

<body>
    <div class="position-relative w-100 h-100">
        <!-- Map Container -->
        <div id="map" class="w-100 h-100"></div>

        <!-- Compass Overlay -->
        <div id="compass-container"
            class="position-absolute top-0 end-0 m-4 rounded-circle shadow d-flex align-items-center justify-content-center"
            style="width: 130px; height: 130px; z-index: 1000; overflow: visible;">

            <!-- Red Gradient Border (conic-gradient container) -->
            <div id="compass-gradient-border" class="position-absolute w-100 h-100 rounded-circle"
                style="top: 0; left: 0; pointer-events: none;">
            </div>

            <!-- Inner Circle (background and interactive slices) -->
            <div class="position-absolute bg-white rounded-circle d-flex align-items-center justify-content-center"
                style="top: 3px; left: 3px; right: 3px; bottom: 3px; overflow: hidden;">

                <!-- Pie Slices SVG -->
                <svg xmlns="http://www.w3.org/2000/svg" width="124" height="124" viewBox="0 0 124 124"
                    class="position-absolute start-0 top-0 w-100 h-100" style="z-index: 1;">
                    <!-- North Slice -->
                    <g class="compass-slice" onclick="setMapRotation(0)">
                        <path class="compass-slice-path"
                            d="M 18.16 18.16 A 62 62 0 0 1 105.84 18.16 L 84.98 39.02 A 32.5 32.5 0 0 0 39.02 39.02 Z" />
                        <text x="62" y="19" class="compass-slice-text">N</text>
                    </g>
                    <!-- East Slice -->
                    <g class="compass-slice" onclick="setMapRotation(90)">
                        <path class="compass-slice-path"
                            d="M 105.84 18.16 A 62 62 0 0 1 105.84 105.84 L 84.98 84.98 A 32.5 32.5 0 0 0 84.98 39.02 Z" />
                        <text x="105" y="62" class="compass-slice-text">E</text>
                    </g>
                    <!-- South Slice -->
                    <g class="compass-slice" onclick="setMapRotation(180)">
                        <path class="compass-slice-path"
                            d="M 105.84 105.84 A 62 62 0 0 1 18.16 105.84 L 39.02 84.98 A 32.5 32.5 0 0 0 84.98 84.98 Z" />
                        <text x="62" y="105" class="compass-slice-text">S</text>
                    </g>
                    <!-- West Slice -->
                    <g class="compass-slice" onclick="setMapRotation(270)">
                        <path class="compass-slice-path"
                            d="M 18.16 105.84 A 62 62 0 0 1 18.16 18.16 L 39.02 39.02 A 32.5 32.5 0 0 0 39.02 84.98 Z" />
                        <text x="19" y="62" class="compass-slice-text">W</text>
                    </g>
                </svg>

                <!-- Central Display / Nadir Button. Direction is shown by the red arrow
                     (--map-rotation) and this button's pressed state, not by text. -->
                <button id="nadir-btn"
                    class="btn btn-light rounded-circle shadow-sm border text-center d-flex flex-column justify-content-center align-items-center position-absolute"
                    style="width: 65px; height: 65px; line-height: 1.1; padding: 0; z-index: 10; top: 50%; left: 50%; transform: translate(-50%, -50%);"
                    onclick="setNadir()" title="Click for Nadir view" aria-pressed="false">
                    <span class="nadir-btn-text">Nadir</span>
                </button>
            </div>
        </div>

        <!-- Loading overlay -->
        <div id="loading-overlay"
            class="position-absolute top-50 start-50 translate-middle bg-white p-3 rounded shadow d-none"
            style="z-index: 1000;">
            <div class="spinner-border spinner-border-sm text-dark me-2" role="status"></div>
            <span>Loading Image...</span>
        </div>
    </div>

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.11.0/proj4.js"></script>
    <!-- geotiff.js: the ol.js bundle does not include it; ol.source.GeoTIFF needs the global -->
    <script src="https://cdn.jsdelivr.net/npm/geotiff@2.1.3/dist-browser/geotiff.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ol@v9.2.4/dist/ol.js"></script>

    <script src="app.slim.js"></script>
</body>

</html>
